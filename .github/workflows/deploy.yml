name: Deploy on aws

on: 
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} 
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # STEP 1: Sync Backend Files to EC2
      - name: Sync Backend files to EC2
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ubuntu
          TARGET: /home/ubuntu/app/backend-ws
          SOURCE: "backend-ws/"

      # STEP 2: Install and Start Backend
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create folder and set permissions automatically
            sudo mkdir -p /home/ubuntu/app/backend-ws
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app
            
            cd /home/ubuntu/app/backend-ws
            npm install --production
            # Restarts the app, or starts it if this is the first time
            pm2 restart backend || pm2 start index.js --name "backend"

      # STEP 3: Build and Sync Frontend to S3
      - name: Deploy Frontend
        run: | 
          cd frontend-ws
          npm install
          npm run build
          # Vite uses 'dist' folder by default
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
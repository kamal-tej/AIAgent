name: Deploy on aws

on: 
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} 
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # STEP 1: Sync Backend Files to EC2
      - name: Sync Backend files to EC2
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ubuntu
          TARGET: /home/ubuntu/app
          SOURCE: "backend-ws/"

      # STEP 2: Run Backend Commands
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure the directory exists first
            mkdir -p /home/ubuntu/app/backend-ws 
            cd /home/ubuntu/app/backend-ws
            npm install
            # This will try to restart, and if it's the first time, it starts it
            pm2 restart all || (npm install -g pm2 && pm2 start index.js --name "backend")

      # STEP 3: Deploy Frontend
      - name: Deploy Frontend
        run: | 
          cd frontend-ws
          npm install
          npm run build
          # Use your secret here instead of hardcoding
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete
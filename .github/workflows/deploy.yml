name: Deploy on aws

on: 
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }} 
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # STEP 1: Sync Backend Files to EC2
      - name: Sync Backend files to EC2
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ubuntu
          TARGET: /home/ubuntu/app/backend-ws
          SOURCE: "backend-ws/"

      # STEP 2: Install Node.js, TypeScript tools, and Start Backend
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Install Node.js 20 if missing
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # 2. Fix permissions
            sudo mkdir -p /home/ubuntu/app/backend-ws
            sudo chown -R ubuntu:ubuntu /home/ubuntu/app
            
            cd /home/ubuntu/app/backend-ws
            
            # 3. Install dependencies (including typescript and ts-node)
            npm install

            # 4. Install PM2 and TypeScript runners globally
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2 ts-node typescript
            fi

            # 5. Restart/Start the app using ts-node
            # We delete the old process first to avoid "Namespace not found" errors
            pm2 delete backend || true
            pm2 start ts-node -- -P tsconfig.json server.ts --name "backend"

      # STEP 3: Build and Sync Frontend to S3
      - name: Deploy Frontend
        run: | 
          cd frontend-ws
          npm install
          npm run build
          # Vite uses 'dist' folder by default
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete